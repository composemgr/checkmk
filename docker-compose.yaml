# nginx proxy address - http://172.17.0.1:60129

name: checkmk
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  app:
    image: checkmk/check-mk-raw:latest
    container_name: checkmk-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      - CMK_SITE_ID=cmk
      - CMK_LIVESTATUS_TCP=on
      - TZ=${TZ:-America/New_York}
      - MAIL_RELAY_HOST=${EMAIL_SERVER_HOST:-172.17.0.1}
      - CMK_PASSWORD=${APP_ADMIN_PASS:-u86ydJk3WmCfpODZ}
    ports:
      - '162:162/udp'
      - '514:514/udp'
      - '514:514/tcp'
      - '6557:6557/tcp'
      - '60128:5000/tcp'
      - '172.17.0.1:60129:8000/tcp'
    ulimits:
      nofile: 1024
    volumes:
      - '/etc/localtime:/etc/localtime:ro'
      - './rootfs/data/checkmk:/omd/sites'
    tmpfs:
      - './rootfs/temp:uid=1000,gid=1000'
    networks:
      - checkmk

networks:
  checkmk:
    name: checkmk
    external: false
